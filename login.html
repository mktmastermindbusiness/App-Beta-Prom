<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qdelícia Frutas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; max-width: 420px; width: 100%; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 40px 32px; border-top: 6px solid #4f46e5; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo img { max-width: 180px; height: auto; }
        .logo h1 { font-size: 1.3rem; font-weight: 800; color: #1e1b4b; margin-top: 8px; }
        .logo p { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 6px; }
        select, input[type="email"], input[type="password"] { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background: white; transition: border-color 0.2s; font-family: inherit; }
        select:focus, input:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        select:disabled { opacity: 0.5; cursor: not-allowed; background: #f8fafc; }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #1e1b4b, #4f46e5); color: white; border: none; border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; font-family: inherit; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.35); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: #dc2626; font-size: 0.85rem; font-weight: 600; text-align: center; margin-top: 12px; display: none; }
        .loading-state { text-align: center; padding: 40px 0; }
        .loading-state .spinner-lg { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        .loading-state p { color: #64748b; font-size: 0.95rem; }
        .login-mode-toggle { text-align: center; font-size: 0.85rem; color: #64748b; margin-top: 16px; }
        .login-mode-toggle a { color: #4f46e5; font-weight: 600; cursor: pointer; text-decoration: none; }
        .login-mode-toggle a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card" id="loginCard">
        <div class="logo">
            <img src="./images/logo-qdelicia.png" alt="Qdelícia Frutas">
            <h1>Qdelícia Frutas</h1>
            <p>Área do Promotor</p>
        </div>

        <div id="loadingState" class="loading-state">
            <div class="spinner-lg"></div>
            <p>Carregando...</p>
        </div>

        <div id="formState" style="display:none;">
            <div id="dropdownMode">
                <div class="form-group">
                    <label>Rede</label>
                    <select id="redeSelect"><option value="">Carregando...</option></select>
                </div>
                <div class="form-group">
                    <label>Loja</label>
                    <select id="lojaSelect" disabled><option value="">Aguardando rede...</option></select>
                </div>
                <button class="btn-primary" id="btnEntrar" disabled>Entrar</button>
            </div>

            <div id="loginMode" style="display:none;">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="emailInput" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senhaInput" placeholder="senha">
                </div>
                <div id="loginError" class="error-msg"></div>
                <button class="btn-primary" id="btnLogin">Entrar</button>
            </div>

            <div id="loginModeToggle" class="login-mode-toggle" style="display:none;">
                <a id="toggleLoginMode">Entrar com e-mail e senha</a>
            </div>
        </div>

        <div id="successState" style="display:none;text-align:center;padding:20px 0;">
            <div style="font-size:48px;margin-bottom:12px;">&#10004;&#65039;</div>
            <p style="font-size:1.1rem;font-weight:700;color:#1e1b4b;" id="successMsg">Redirecionando...</p>
        </div>
    </div>

    <script src="global-state.js"></script>
    <script src="iframe-comm.js"></script>
    <script>
        (function() {
            var GAS_URL = 'https://script.google.com/macros/s/AKfycbzJgx-MraCUC0yqzxkwoS0OXtP4XL3o2n5NGOZXrKrWzN_Xw2t6bwthc7_n0TL-a0M2sA/exec';
            var redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'index.html';

            var GS = window.GlobalState;
            GS.init(GAS_URL);

            var config = null;
            var isLoginMode = false;
            var useLogin = false;

            function showForm() { document.getElementById('loadingState').style.display = 'none'; document.getElementById('formState').style.display = 'block'; }
            function showSuccess(msg) { document.getElementById('formState').style.display = 'none'; document.getElementById('successState').style.display = 'block'; document.getElementById('successMsg').textContent = msg; }

            function doRedirect() {
                setTimeout(function() { window.location.replace(redirectUrl); }, 300);
            }

            function finishLogin(rede, loja, promotor, estado) {
                GS.setSelection(rede, loja, promotor, estado);
                GS.setConfirmedToday();
                showSuccess('Bem-vindo, ' + promotor + '!');
                doRedirect();
            }

            // Load config
            GS.loadConfig().then(function(cfg) {
                if (!cfg) {
                    document.getElementById('loadingState').innerHTML = '<p style="color:#dc2626;font-weight:600;">Erro ao carregar dados. <a href="javascript:location.reload()">Tentar novamente</a></p>';
                    return;
                }
                config = cfg;
                isLoginMode = cfg.LOGIN_ATIVO === true;
                useLogin = isLoginMode;

                if (isLoginMode) {
                    document.getElementById('dropdownMode').style.display = 'none';
                    document.getElementById('loginMode').style.display = 'block';
                    document.getElementById('loginModeToggle').style.display = 'none';
                } else {
                    document.getElementById('dropdownMode').style.display = 'block';
                    document.getElementById('loginMode').style.display = 'none';
                    document.getElementById('loginModeToggle').style.display = 'block';
                }
                showForm();
                setupDropdowns();
                setupLoginToggle();

                // Pre-fill from saved selection
                var saved = GS.getSelection();
                if (saved && saved.rede && !isLoginMode) {
                    var redeSel = document.getElementById('redeSelect');
                    if (redeSel) {
                        redeSel.value = saved.rede;
                        if (typeof redeSel.onchange === 'function') redeSel.onchange();
                        var lojaSel = document.getElementById('lojaSelect');
                        if (lojaSel && saved.loja) {
                            lojaSel.value = saved.loja;
                            if (typeof lojaSel.onchange === 'function') lojaSel.onchange();
                        }
                    }
                }
            });

            function setupDropdowns() {
                var est = config.ESTRUTURA_ESTADOS;
                if (!est) return;
                var redes = Object.keys(est).reduce(function(acc, e) {
                    Object.keys(est[e]).forEach(function(r) { if (acc.indexOf(r) === -1) acc.push(r); });
                    return acc;
                }, []).sort();

                var redeSel = document.getElementById('redeSelect');
                var lojaSel = document.getElementById('lojaSelect');
                var btnEntrar = document.getElementById('btnEntrar');

                redeSel.innerHTML = '<option value="">Selecione a Rede</option>';
                redes.forEach(function(r) { redeSel.innerHTML += '<option value="' + r.replace(/"/g, '&quot;') + '">' + r + '</option>'; });

                redeSel.addEventListener('change', function() {
                    var rede = redeSel.value;
                    lojaSel.innerHTML = '<option value="">Selecione a Loja</option>';
                    lojaSel.disabled = !rede;
                    btnEntrar.disabled = true;
                    if (!rede) return;
                    var lojas = [];
                    for (var e in est) if (est[e][rede]) for (var p in est[e][rede]) est[e][rede][p].forEach(function(l) { if (lojas.indexOf(l) === -1) lojas.push(l); });
                    lojas.sort().forEach(function(l) { lojaSel.innerHTML += '<option value="' + l.replace(/"/g, '&quot;') + '">' + l + '</option>'; });
                });

                lojaSel.addEventListener('change', function() {
                    btnEntrar.disabled = !redeSel.value || !lojaSel.value;
                });

                btnEntrar.addEventListener('click', function() {
                    var rede = redeSel.value;
                    var loja = lojaSel.value;
                    if (!rede || !loja) return;
                    var info = GS.findPromotor(rede, loja);
                    finishLogin(rede, loja, info ? info.promotor : '', info ? info.estado : '');
                });
            }

            function setupLoginToggle() {
                var toggleLink = document.getElementById('toggleLoginMode');
                var dropdownMode = document.getElementById('dropdownMode');
                var loginMode = document.getElementById('loginMode');

                toggleLink.addEventListener('click', function() {
                    if (dropdownMode.style.display !== 'none') {
                        dropdownMode.style.display = 'none';
                        loginMode.style.display = 'block';
                        toggleLink.textContent = 'Voltar para seleção de Rede/Loja';
                    } else {
                        dropdownMode.style.display = 'block';
                        loginMode.style.display = 'none';
                        toggleLink.textContent = 'Entrar com e-mail e senha';
                    }
                });

                // Login form
                var emailInput = document.getElementById('emailInput');
                var senhaInput = document.getElementById('senhaInput');
                var btnLogin = document.getElementById('btnLogin');
                var loginError = document.getElementById('loginError');

                function submitLogin() {
                    var email = emailInput.value.trim();
                    var senha = senhaInput.value;
                    if (!email || !senha) { loginError.textContent = 'Preencha e-mail e senha.'; loginError.style.display = 'block'; return; }
                    loginError.style.display = 'none';
                    btnLogin.disabled = true;
                    btnLogin.innerHTML = '<div class="spinner" style="display:inline-block;"></div>';

                    var loginTimeout = setTimeout(function() {
                        loginError.textContent = 'Erro ao conectar ao servidor. Tente novamente.';
                        loginError.style.display = 'block';
                        btnLogin.disabled = false;
                        btnLogin.innerHTML = 'Entrar';
                    }, 15000);

                    GS.postViaForm(GAS_URL, { action: 'validar_login', email: email, senha: senha }, function(data) {
                        clearTimeout(loginTimeout);
                        btnLogin.disabled = false;
                        btnLogin.innerHTML = 'Entrar';
                        if (data && data.success) {
                            GS.setSession(data.user);
                            var user = data.user;
                            // Show loja selection or finish
                            var est = config.ESTRUTURA_ESTADOS;
                            if (est && est[user.estado] && est[user.estado][user.rede]) {
                                var promotorLojas = est[user.estado][user.rede][user.promotor] || [];
                                var lojasPermitidas = user.lojas && user.lojas.length ? user.lojas.filter(function(l) { return promotorLojas.indexOf(l) !== -1; }) : promotorLojas;
                                if (lojasPermitidas.length === 1) {
                                    user.lojaAtual = lojasPermitidas[0];
                                    GS.setSession(user);
                                    finishLogin(user.rede, user.lojaAtual, user.promotor, user.estado);
                                } else if (lojasPermitidas.length > 1) {
                                    showLojaStep(user, lojasPermitidas);
                                } else {
                                    finishLogin(user.rede, '', user.promotor, user.estado);
                                }
                            } else {
                                finishLogin(user.rede, '', user.promotor, user.estado);
                            }
                        } else {
                            loginError.textContent = 'E-mail ou senha inválidos.';
                            loginError.style.display = 'block';
                        }
                    });
                }

                btnLogin.addEventListener('click', submitLogin);
                senhaInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitLogin(); });
            }

            function showLojaStep(user, lojas) {
                document.getElementById('dropdownMode').style.display = 'none';
                document.getElementById('loginMode').style.display = 'none';
                document.getElementById('loginModeToggle').style.display = 'none';

                var opts = '';
                lojas.forEach(function(l) { opts += '<option value="' + l.replace(/"/g, '&quot;') + '">' + l + '</option>'; });
                var html =
                    '<p style="text-align:center;color:#1e1b4b;font-weight:700;margin-bottom:4px;">' + user.promotor + '</p>' +
                    '<p style="text-align:center;color:#64748b;font-size:14px;margin-bottom:18px;">' + user.rede + '</p>' +
                    '<div class="form-group"><label>Selecione a Loja</label><select id="lojaStepSelect" style="width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:1rem;">' + opts + '</select></div>' +
                    '<button class="btn-primary" id="btnLojaStep">Entrar</button>';
                document.getElementById('formState').innerHTML = html;
                document.getElementById('formState').style.display = 'block';

                document.getElementById('btnLojaStep').addEventListener('click', function() {
                    user.lojaAtual = document.getElementById('lojaStepSelect').value;
                    GS.setSession(user);
                    finishLogin(user.rede, user.lojaAtual, user.promotor, user.estado);
                });
            }
        })();
    </script>
</body>
</html>
