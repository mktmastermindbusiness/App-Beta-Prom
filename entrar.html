<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesso ao sistema Qdelícia Frutas">
    <title>Entrar - Qdelícia Frutas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(30, 27, 75, 0.12);
            padding: 40px 32px 36px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            width: 100px;
            height: auto;
            margin-bottom: 8px;
        }
        .login-title {
            font-family: 'Lexend', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 28px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }
        .form-group label i {
            margin-right: 5px;
            color: #6366f1;
        }
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: auto;
            cursor: pointer;
        }
        .form-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-group select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }
        .btn-entrar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            color: #ffffff;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-entrar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
        }
        .btn-entrar:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn-entrar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .spinner-btn {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-entrar.loading .spinner-btn { display: inline-block; }
        .btn-entrar.loading .btn-text { display: none; }
        .welcome-banner {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            animation: slideIn 0.4s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-banner i { font-size: 1.2rem; }
        .error-msg {
            color: #dc2626;
            font-size: 0.82rem;
            margin-top: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .error-msg.show { display: flex; }
        .loading-estrutura {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 24px 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        .loading-estrutura .spin {
            width: 20px;
            height: 20px;
            border: 2.5px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .version-footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="./images/logo-qdelicia.png" alt="Qdelícia Frutas" class="login-logo">
        <div class="login-title">Área do Promotor</div>
        <div class="login-sub">Selecione sua Rede e Loja para acessar</div>

        <div id="welcomeBanner" class="welcome-banner">
            <i class="fas fa-hand-peace"></i>
            <span id="welcomeText"></span>
        </div>

        <div id="loadingStruct" class="loading-estrutura">
            <div class="spin"></div>
            <span>Carregando dados...</span>
        </div>

        <div id="formContent" style="display:none;">
            <div class="form-group">
                <label><i class="fas fa-store"></i> Rede</label>
                <select id="selectRede"><option value="" disabled selected>Selecione a Rede</option></select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Loja</label>
                <select id="selectLoja" disabled><option value="" disabled selected>Selecione a Loja</option></select>
            </div>
            <button class="btn-entrar" id="btnEntrar" disabled>
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Entrar</span>
                <span class="spinner-btn"></span>
            </button>
            <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> <span id="errorText"></span></div>
        </div>

        <div class="version-footer">Qdelícia Frutas &copy; 2025</div>
    </div>

    <script src="shared-rede-loja.js"></script>
    <script>
        var selectRede = document.getElementById('selectRede');
        var selectLoja = document.getElementById('selectLoja');
        var btnEntrar = document.getElementById('btnEntrar');
        var welcomeBanner = document.getElementById('welcomeBanner');
        var welcomeText = document.getElementById('welcomeText');
        var errorMsg = document.getElementById('errorMsg');
        var errorText = document.getElementById('errorText');
        var loadingStruct = document.getElementById('loadingStruct');
        var formContent = document.getElementById('formContent');

        var currentPromotor = null;

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('show');
        }

        function hideError() {
            errorMsg.classList.remove('show');
        }

        function showWelcome(promotorNome) {
            var fullName = window.QD.getPromotorFullName(promotorNome);
            welcomeText.textContent = 'Bem-vindo, ' + fullName + '!';
            welcomeBanner.style.display = 'flex';
        }

        function hideWelcome() {
            welcomeBanner.style.display = 'none';
        }

        function updateEntrarButton() {
            var rede = selectRede.value;
            var loja = selectLoja.value;
            btnEntrar.disabled = !(rede && loja);
        }

        // Carrega estrutura do GAS
        window.QD.fetchEstruturaComFallback()
            .then(function(estrutura) {
                loadingStruct.style.display = 'none';
                formContent.style.display = 'block';

                window.QD.carregarRedes(selectRede, estrutura);

                selectRede.addEventListener('change', function() {
                    var rede = selectRede.value;
                    hideWelcome();
                    hideError();
                    currentPromotor = null;
                    window.QD.carregarLojas(rede, selectLoja, estrutura);
                    updateEntrarButton();
                });

                selectLoja.addEventListener('change', function() {
                    var rede = selectRede.value;
                    var loja = selectLoja.value;
                    if (rede && loja) {
                        currentPromotor = window.QD.findPromotorPorLoja(estrutura, rede, loja);
                        if (currentPromotor) showWelcome(currentPromotor);
                    }
                    updateEntrarButton();
                });

                btnEntrar.addEventListener('click', function() {
                    var rede = selectRede.value;
                    var loja = selectLoja.value;
                    if (!rede || !loja) return;

                    btnEntrar.classList.add('loading');
                    btnEntrar.disabled = true;

                    currentPromotor = window.QD.findPromotorPorLoja(estrutura, rede, loja);
                    window.QD.salvarSelecao(rede, loja, currentPromotor || '');

                    // Salva estrutura completa em cache
                    try {
                        localStorage.setItem('qd_app_estrutura', JSON.stringify(estrutura));
                    } catch(e) {}

                    window.location.href = 'index.html';
                });
            })
            .catch(function(err) {
                loadingStruct.innerHTML = '<div style="color:#dc2626;"><i class="fas fa-exclamation-triangle"></i> Erro ao carregar dados: ' + err.message + '<br><small>Verifique sua conexão e tente novamente.</small></div>';
                loadingStruct.style.display = 'flex';
                formContent.style.display = 'none';
            });
    </script>
</body>
</html>
