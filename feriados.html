<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <meta name="description" content="Feriados Trabalhados - Qdelícia Frutas">
    <title>Feriados - Qdelícia Frutas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="bananeiro.js" defer></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .iframe-container {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: var(--white);
        }

        .iframe-wrapper {
            position: relative;
            border: none;
            border-radius: 0;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 75vh;
            -webkit-overflow-scrolling: touch;
        }

        .iframe-wrapper::after {
            content: '↕ Role dentro do formulário para ver mais';
            display: block;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 5px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }

        footer {
            margin-top: auto;
            padding: 15px;
        }

        @media (max-width: 600px) {
            .iframe-container {
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <header id="cabecalho-principal">
        <a href="materiais.html" class="header-materiais-btn" aria-label="Materiais">
            <i class="fas fa-book"></i>
            <span>Materiais</span>
        </a>
        <div class="logo-placeholder">
            <img src="./images/logo-qdelicia.png" alt="Qdelícia Frutas">
        </div>
        <h1 id="welcome-message">Feriados</h1>

        <p style="display: none;">Feriados Trabalhados</p>
    </header>

    <div id="userInfo" class="user-badge">
        <span id="userInfoText" class="badge-text"></span>
        <button onclick="sair()" class="badge-sair">Sair</button>
    </div>

    <nav class="desktop-nav">
        <a href="index.html">Início</a>
        <a href="estoque.html">Estoque</a>
        <a href="camera.html">Câmera</a>
        <a href="materiais.html">Materiais</a>
        <a href="pedido.html">Sugestão</a>
        <a href="feriados.html" class="active">Feriados</a>
        <a href="solicitacoes.html">Solicitações</a>
    </nav>

    <main class="iframe-container" id="container-feriados">
        <div class="iframe-wrapper" id="wrapper-feriados" style="display: flex;">
            <iframe id="iframe-feriados"
                frameborder="0" marginheight="0" marginwidth="0" style="display: block;">
                Carregando formulário...
            </iframe>
        </div>
    </main>

    <nav class="bottom-tabs">
        <a href="index.html" class="tab-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="estoque.html" class="tab-item"><i class="fas fa-boxes-stacked"></i><span>Estoque</span></a>
        <a href="camera.html" class="tab-item tab-camera"><span class="cam-wrap"><i class="fas fa-camera"></i></span><span>Câmera</span></a>
        <a href="pedido.html" class="tab-item"><i class="fas fa-file-invoice"></i><span>Sugestão</span></a>
        <a href="feriados.html" class="tab-item active"><i class="fas fa-calendar-alt"></i><span>Feriados</span></a>
    </nav>

    <a href="https://wa.me/5581997250086" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <div class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="shared-rede-loja.js"></script>
    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script>
        var GAS_FERIADOS = 'https://script.google.com/macros/s/AKfycbxUENjCvm715TESMt3wjyYAIjfhdyUstNF8QpnQmUdCKcfhJbYUFK3pYRmnCyRMuzQL/exec';

        document.addEventListener('DOMContentLoaded', function() {
            var sel = window.QD.getSelecao();
            var params = '';
            if (sel && sel.rede && sel.loja) {
                params = '&rede=' + encodeURIComponent(sel.rede) + '&loja=' + encodeURIComponent(sel.loja) + '&promotor=' + encodeURIComponent(sel.promotor || '');
            }

            var iframe = document.getElementById('iframe-feriados');
            if (iframe) {
                iframe.src = GAS_FERIADOS + '?page=Colaborador' + params;
                iframe.onload = function() {
                    try {
                        iframe.contentWindow.postMessage({ type: 'app-selecao', rede: sel.rede, loja: sel.loja, promotor: sel.promotor || '' }, '*');
                    } catch(e) {}
                };
            }
        });

        function recarregarPagina() {
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var sel = window.QD.getSelecao();
            var userInfo = document.getElementById('userInfo');
            var userInfoText = document.getElementById('userInfoText');
            if (userInfo && sel && sel.rede && sel.loja) {
                userInfoText.textContent = sel.rede + ' \u203A ' + sel.loja;
                if (sel.promotor) {
                    userInfoText.textContent = sel.promotor + ' | ' + sel.rede + ' \u203A ' + sel.loja;
                }
                userInfo.style.display = 'flex';
            }
        });
        function sair() { window.QD.limparSelecao(); window.location.replace('entrar.html'); }
    </script>
</body>
</html>
