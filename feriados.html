<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <meta name="description" content="Feriados Trabalhados - Qdelícia Frutas">
    <title>Feriados - Qdelícia Frutas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .iframe-container {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: var(--white);
        }

        .iframe-wrapper {
            position: relative;
            border: none;
            border-radius: 0;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 75vh;
            -webkit-overflow-scrolling: touch;
        }

        .iframe-wrapper::after {
            content: '↕ Role dentro do formulário para ver mais';
            display: block;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 5px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }

        footer {
            margin-top: auto;
            padding: 15px;
        }

        @media (max-width: 600px) {
            .iframe-container {
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <header id="cabecalho-principal">
        <a href="materiais.html" class="header-materiais-btn" aria-label="Materiais">
            <i class="fas fa-book"></i>
        </a>
        <div class="logo-placeholder">
            <img src="./images/logo-qdelicia.png" alt="Qdelícia Frutas">
        </div>
        <h1 id="welcome-message">Feriados</h1>
        <div id="global-badge" style="display:none;font-size:12px;color:var(--brand);font-weight:600;margin-left:auto;padding:0 12px;white-space:nowrap;"></div>
        <p style="display: none;">Feriados Trabalhados</p>
        <button onclick="recarregarPagina()" class="btn-refresh"><i class="fas fa-sync-alt"></i> Atualizar</button>
    </header>

    <nav class="desktop-nav">
        <a href="index.html">Início</a>
        <a href="estoque.html">Estoque</a>
        <a href="camera.html">Câmera</a>
        <a href="materiais.html">Materiais</a>
        <a href="pedido.html">Sugestão</a>
        <a href="feriados.html" class="active">Feriados</a>
        <a href="solicitacoes.html">Solicitações</a>
    </nav>

    <main class="iframe-container" id="container-feriados">
        <div class="iframe-wrapper" id="wrapper-feriados" style="display: flex;">
            <iframe id="iframe-feriados"
                src="https://script.google.com/macros/s/AKfycbwqtfD0Pjxz2SMYqGQv99ekAjxHOxCkZJveJvTG9i13ubxJNwqCKUA2MWEIUqKMm_M6/exec?page=Colaborador"
                frameborder="0" marginheight="0" marginwidth="0" style="display: block;">
                Carregando formulário...
            </iframe>
        </div>
    </main>

    <nav class="bottom-tabs">
        <a href="index.html" class="tab-item"><i class="fas fa-home"></i><span>Início</span></a>
        <a href="estoque.html" class="tab-item"><i class="fas fa-boxes-stacked"></i><span>Estoque</span></a>
        <a href="camera.html" class="tab-item tab-camera"><span class="cam-wrap"><i class="fas fa-camera"></i></span><span>Câmera</span></a>
        <a href="pedido.html" class="tab-item"><i class="fas fa-file-invoice"></i><span>Sugestão</span></a>
        <a href="feriados.html" class="tab-item active"><i class="fas fa-calendar-alt"></i><span>Feriados</span></a>
    </nav>

    <a href="https://wa.me/5581997250086" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <div class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="global-state.js"></script>
    <script src="iframe-comm.js"></script>
    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script>
        GlobalState.init('https://script.google.com/macros/s/AKfycbwv7QWkSKcu25qqA_rAc8X8LSsTsEomRxBKFE2-CFGpuRh7nM-dfqt3bgvWjGcoLGGAow/exec');
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof GlobalState !== 'undefined') {
                GlobalState.showBadge('global-badge');
                GlobalState.promptIfNeeded().then(function() {
                    IframeComm.reloadAllWithSelection('#wrapper-feriados');
                });
            }
            IframeComm.setupAutoSend('#wrapper-feriados');
            var iframe = document.getElementById('iframe-feriados');
            iframe.onload = function() {
                // iframe loaded
            };
        });

        function recarregarPagina() {
            location.reload();
        }
    </script>
</body>
</html>
